name: Build BasiliskII iOS

on:
  push:
    branches: [ "main", "master", "ios" ]
  pull_request:
    branches: [ "main", "master", "ios" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'ios'
          submodules: recursive

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^16.0'

      - name: Install build dependencies
        run: brew install autoconf automake libtool

      - name: Generate Core Headers
        run: |
          cd BasiliskII/src/Unix
          ./autogen.sh --without-x --without-gtk --without-mon --without-sdl

      - name: Pre-build uae_cpu generators
        run: |
          cd BasiliskII/src/uae_cpu
          make -f ../iOS/cpu.make install SRCROOT=../iOS

      - name: Build Xcode Project
        run: |
          cd BasiliskII/src/iOS
          xcodebuild archive \
            -project BasiliskII.xcodeproj \
            -scheme BasiliskII \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/BasiliskII.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            SWIFT_VERSION=5.0

      - name: Package Unsigned IPA
        run: |
          cd BasiliskII/src/iOS
          mkdir -p ./build/Payload
          cp -r ./build/BasiliskII.xcarchive/Products/Applications/*.app ./build/Payload/
          cd ./build
          zip -r BasiliskII.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BasiliskII-iOS-Unsigned-IPA
          path: BasiliskII/src/iOS/build/BasiliskII.ipa
